title: "JamesVincent.co.uk"
description: "Technical architecture, engineering insight, and field notes on Microsoft Intune, endpoint management, and modern workplace transformation."
author: "James Vincent"
email: ""
url: "https://jamesvincent.co.uk"
baseurl: ""
lang: en_GB
timezone: Europe/London

theme: minima
markdown: kramdown
permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

minima:
  skin: auto
  show_excerpts: true
  social_links:
    - title: GitHub
      icon: github
      url: https://github.com/jamesvincent

header_pages:
  - about.md
  - search.md
  - tags.md

# Google Analytics 4 measurement ID. Minima will only render this in production.
# Example: G-XXXXXXXXXX
google_analytics: ""

# utterances configuration
utterances:
  repo: "jamesvincent/blog"
  issue_term: "pathname"
  theme: "github-light"
  label: "comments"

collections:
  pages:
    output: true

defaults:
  - scope:
      path: ""
    values:
      image: /assets/site-card.png
